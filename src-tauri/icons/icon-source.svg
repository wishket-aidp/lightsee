<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4A90D9"/>
      <stop offset="100%" stop-color="#1B3A5C"/>
    </linearGradient>
    <linearGradient id="docFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#dce8f5" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="eyeGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#1E40AF"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#000" flood-opacity="0.25"/>
    </filter>
    <filter id="innerGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect x="32" y="32" width="960" height="960" rx="215" ry="215" fill="url(#bg)"/>

  <!-- Subtle inner highlight -->
  <rect x="32" y="32" width="960" height="480" rx="215" ry="215" fill="white" opacity="0.06"/>

  <!-- Document shape -->
  <g filter="url(#shadow)">
    <path d="M340 230 L640 230 L720 310 L720 794 Q720 814 700 814 L360 814 Q340 814 340 794 Z" fill="url(#docFill)"/>
    <!-- Folded corner -->
    <path d="M640 230 L640 310 L720 310 Z" fill="#c0d4ea" opacity="0.7"/>
  </g>

  <!-- Text lines on document -->
  <rect x="400" y="310" width="240" height="16" rx="8" fill="#a0b8d0" opacity="0.5"/>
  <rect x="400" y="346" width="200" height="16" rx="8" fill="#a0b8d0" opacity="0.4"/>
  <rect x="400" y="660" width="220" height="16" rx="8" fill="#a0b8d0" opacity="0.4"/>
  <rect x="400" y="696" width="180" height="16" rx="8" fill="#a0b8d0" opacity="0.35"/>
  <rect x="400" y="732" width="240" height="16" rx="8" fill="#a0b8d0" opacity="0.3"/>

  <!-- Eye symbol -->
  <g transform="translate(530, 520)">
    <!-- Outer eye shape -->
    <ellipse cx="0" cy="0" rx="140" ry="85" fill="none" stroke="url(#eyeGrad)" stroke-width="18" stroke-linecap="round"/>
    <!-- Iris -->
    <circle cx="0" cy="0" r="52" fill="url(#eyeGrad)"/>
    <!-- Pupil -->
    <circle cx="0" cy="0" r="24" fill="#0f172a"/>
    <!-- Light reflection -->
    <circle cx="-12" cy="-14" r="10" fill="white" opacity="0.85"/>
    <circle cx="8" cy="10" r="5" fill="white" opacity="0.4"/>
  </g>
</svg>
