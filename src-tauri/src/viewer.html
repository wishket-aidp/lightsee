<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lightsee</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { height: 100%; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            transition: background-color 0.3s, color 0.3s;
            padding: 32px;
            padding-top: 48px;
            overflow-y: auto;
        }

        .status-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            padding: 6px 16px;
            font-size: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }
        .status-left { display: flex; align-items: center; gap: 6px; }
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
        }
        .status-dot.connected { background: #4caf50; }
        .status-dot.disconnected { background: #f44336; }

        .markdown-body {
            max-width: 960px;
            margin: 0 auto;
            word-wrap: break-word;
            overflow-wrap: break-word;
        }
        .markdown-body h1, .markdown-body h2, .markdown-body h3,
        .markdown-body h4, .markdown-body h5, .markdown-body h6 {
            color: var(--heading-color);
            margin-top: 1.5em;
            margin-bottom: 0.5em;
            line-height: 1.3;
        }
        .markdown-body h1 { font-size: 2em; border-bottom: 1px solid var(--border-color); padding-bottom: 0.3em; }
        .markdown-body h2 { font-size: 1.5em; border-bottom: 1px solid var(--border-color); padding-bottom: 0.3em; }
        .markdown-body h3 { font-size: 1.25em; }
        .markdown-body h4 { font-size: 1em; }
        .markdown-body p { margin-bottom: 1em; line-height: 1.7; }
        .markdown-body a { color: var(--link-color); text-decoration: none; }
        .markdown-body a:hover { text-decoration: underline; }
        .markdown-body code {
            background: var(--code-bg);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.9em;
            font-family: "SF Mono", "Fira Code", "Cascadia Code", monospace;
        }
        .markdown-body pre {
            background: var(--code-bg);
            padding: 16px;
            border-radius: 8px;
            overflow-x: auto;
            margin-bottom: 1em;
        }
        .markdown-body pre code { padding: 0; background: none; }
        .markdown-body blockquote {
            border-left: 4px solid var(--blockquote-border);
            padding: 8px 16px;
            margin: 0 0 1em 0;
            color: var(--blockquote-text);
        }
        .markdown-body ul, .markdown-body ol { margin-bottom: 1em; padding-left: 2em; }
        .markdown-body li { margin-bottom: 0.3em; line-height: 1.7; }
        .markdown-body img { max-width: 100%; border-radius: 8px; }
        .markdown-body hr { border: none; border-top: 1px solid var(--border-color); margin: 2em 0; }
        .markdown-body .table-wrapper { overflow-x: auto; margin-bottom: 1em; -webkit-overflow-scrolling: touch; }
        .markdown-body table { min-width: 100%; width: max-content; border-collapse: collapse; }
        .markdown-body th, .markdown-body td {
            border: 1px solid var(--border-color);
            padding: 8px 12px;
            text-align: left;
        }
        .markdown-body th { background: var(--code-bg); font-weight: 600; }
        .markdown-body strong { font-weight: 600; }
    </style>
</head>
<body>
    <div class="status-bar" id="status-bar">
        <div class="status-left">
            <span class="status-dot disconnected" id="status-dot"></span>
            <span id="status-text">Connecting...</span>
        </div>
        <span id="file-name"></span>
    </div>
    <div class="markdown-body" id="content"></div>

    <!-- Content is pre-sanitized with DOMPurify in the Lightsee desktop app before being served -->
    <script>
        var TOKEN = '{{TOKEN}}';
        var contentEl = document.getElementById('content');
        var statusDot = document.getElementById('status-dot');
        var statusText = document.getElementById('status-text');
        var statusBar = document.getElementById('status-bar');
        var fileNameEl = document.getElementById('file-name');

        function applyTheme(theme) {
            document.body.style.backgroundColor = theme.bg;
            document.body.style.color = theme.text;
            var root = document.documentElement.style;
            root.setProperty('--heading-color', theme.heading);
            root.setProperty('--link-color', theme.link);
            root.setProperty('--code-bg', theme.codeBg);
            root.setProperty('--border-color', theme.border);
            root.setProperty('--blockquote-border', theme.blockquoteBorder);
            root.setProperty('--blockquote-text', theme.blockquoteText);
            statusBar.style.backgroundColor = theme.codeBg + 'dd';
            statusBar.style.color = theme.text;
        }

        function loadContent() {
            fetch('/api/content?token=' + TOKEN)
                .then(function(res) {
                    if (!res.ok) throw new Error('Unauthorized');
                    return res.json();
                })
                .then(function(data) {
                    contentEl.innerHTML = data.html;
                    applyTheme(data.theme);
                    document.body.style.fontSize = data.fontSize + 'px';
                    fileNameEl.textContent = data.fileName;
                    document.title = data.fileName + ' \u2014 Lightsee';
                })
                .catch(function() {
                    contentEl.textContent = 'Failed to load content';
                    contentEl.style.textAlign = 'center';
                    contentEl.style.opacity = '0.5';
                    contentEl.style.marginTop = '40vh';
                });
        }

        function connectWs() {
            var protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
            var ws = new WebSocket(protocol + '//' + location.host + '/ws?token=' + TOKEN);

            ws.onopen = function() {
                statusDot.className = 'status-dot connected';
                statusText.textContent = 'Live';
            };

            ws.onmessage = function() {
                loadContent();
            };

            ws.onclose = function() {
                statusDot.className = 'status-dot disconnected';
                statusText.textContent = 'Reconnecting...';
                setTimeout(connectWs, 2000);
            };

            ws.onerror = function() {
                ws.close();
            };
        }

        loadContent();
        connectWs();
    </script>
</body>
</html>
