name: Build & Release

on:
  push:
    branches:
      - prd

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      should_release: ${{ steps.check.outputs.should_release }}
    steps:
      - uses: actions/checkout@v4

      - name: Read version
        id: version
        run: echo "version=v$(jq -r .version package.json)" >> "$GITHUB_OUTPUT"

      - name: Check if tag already exists
        id: check
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          if git ls-remote --tags origin "refs/tags/$VERSION" | grep -q .; then
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: prepare
    if: needs.prepare.outputs.should_release == 'true'
    strategy:
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            label: macOS-arm64
          - platform: macos-latest
            target: x86_64-apple-darwin
            label: macOS-x64
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            label: Windows-x64

    runs-on: ${{ matrix.platform }}
    env:
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install dependencies
        run: npm ci

      - name: Import Apple certificate
        if: runner.os == 'macOS'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          echo -n "$APPLE_CERTIFICATE" | base64 --decode -o "$CERTIFICATE_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security import "$CERTIFICATE_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: \
            -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain

      - name: Build (macOS)
        if: runner.os == 'macOS'
        env:
          TARGET: ${{ matrix.target }}
          APPLE_SIGNING_IDENTITY: "Developer ID Application: Wishket Co., Ltd. (N9TVH7WV9T)"
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: npm run tauri build -- --target "$TARGET"

      - name: Build (Windows)
        if: runner.os == 'Windows'
        env:
          TARGET: ${{ matrix.target }}
        run: npm run tauri build -- --target "$env:TARGET"

      - name: Upload artifacts (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: Lightsee-${{ matrix.label }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.tar.gz
            src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.tar.gz.sig

      - name: Upload artifacts (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: Lightsee-${{ matrix.label }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe
            src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.nsis.zip
            src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.nsis.zip.sig

      - name: Cleanup keychain
        if: runner.os == 'macOS' && always()
        run: security delete-keychain $RUNNER_TEMP/app-signing.keychain-db || true

  release:
    needs: [prepare, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Create tag
        run: |
          git tag "$VERSION"
          git push origin "$VERSION"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Rename updater artifacts to include architecture
        run: |
          # artifacts/Lightsee-macOS-arm64/Lightsee.app.tar.gz -> Lightsee_aarch64.app.tar.gz
          for dir in artifacts/Lightsee-macOS-arm64 artifacts/Lightsee-macOS-x64 artifacts/Lightsee-Windows-x64; do
            [ -d "$dir" ] || continue
            echo "=== $dir ==="
            ls -la "$dir"
          done

          # Rename macOS updater artifacts to distinguish architectures
          if [ -f "artifacts/Lightsee-macOS-arm64/Lightsee.app.tar.gz" ]; then
            mv "artifacts/Lightsee-macOS-arm64/Lightsee.app.tar.gz" "artifacts/Lightsee-macOS-arm64/Lightsee_aarch64.app.tar.gz"
            mv "artifacts/Lightsee-macOS-arm64/Lightsee.app.tar.gz.sig" "artifacts/Lightsee-macOS-arm64/Lightsee_aarch64.app.tar.gz.sig"
          fi
          if [ -f "artifacts/Lightsee-macOS-x64/Lightsee.app.tar.gz" ]; then
            mv "artifacts/Lightsee-macOS-x64/Lightsee.app.tar.gz" "artifacts/Lightsee-macOS-x64/Lightsee_x64.app.tar.gz"
            mv "artifacts/Lightsee-macOS-x64/Lightsee.app.tar.gz.sig" "artifacts/Lightsee-macOS-x64/Lightsee_x64.app.tar.gz.sig"
          fi

      - name: Generate latest.json
        run: |
          VERSION_NUM="${VERSION#v}"
          REPO="wishket-aidp/lightsee"
          BASE_URL="https://github.com/$REPO/releases/download/$VERSION"

          # Read signatures
          MAC_ARM64_SIG=""
          MAC_X64_SIG=""
          WIN_SIG=""
          [ -f "artifacts/Lightsee-macOS-arm64/Lightsee_aarch64.app.tar.gz.sig" ] && MAC_ARM64_SIG=$(cat "artifacts/Lightsee-macOS-arm64/Lightsee_aarch64.app.tar.gz.sig")
          [ -f "artifacts/Lightsee-macOS-x64/Lightsee_x64.app.tar.gz.sig" ] && MAC_X64_SIG=$(cat "artifacts/Lightsee-macOS-x64/Lightsee_x64.app.tar.gz.sig")
          WIN_SIG_FILE=$(find artifacts/Lightsee-Windows-x64 -name "*.nsis.zip.sig" 2>/dev/null | head -1)
          [ -n "$WIN_SIG_FILE" ] && WIN_SIG=$(cat "$WIN_SIG_FILE")

          # Get Windows nsis.zip filename
          WIN_ZIP=$(find artifacts/Lightsee-Windows-x64 -name "*.nsis.zip" ! -name "*.sig" 2>/dev/null | head -1 | xargs basename 2>/dev/null || echo "")

          cat > artifacts/latest.json << ENDJSON
          {
            "version": "$VERSION_NUM",
            "notes": "See release notes on GitHub",
            "pub_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "platforms": {
              "darwin-aarch64": {
                "signature": "$MAC_ARM64_SIG",
                "url": "$BASE_URL/Lightsee_aarch64.app.tar.gz"
              },
              "darwin-x86_64": {
                "signature": "$MAC_X64_SIG",
                "url": "$BASE_URL/Lightsee_x64.app.tar.gz"
              },
              "windows-x86_64": {
                "signature": "$WIN_SIG",
                "url": "$BASE_URL/$WIN_ZIP"
              }
            }
          }
          ENDJSON

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.version }}
          files: artifacts/**/*
          generate_release_notes: true
